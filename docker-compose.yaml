services:
  api:
    build:
      context: ./demo-api-server
    container_name: demo-api-server
    volumes:
      - ./certs:/certs
    networks:
      - localnet

  app:
    build:
      context: ./demo-app-server
    container_name: demo-app-server
    volumes:
      - ./certs:/certs
    networks:
      - localnet

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/certs
    depends_on:
      - api
      - app
    networks:
      - localnet

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_HOSTNAME: keycloak.local.test
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - localnet

networks:
  localnet:
