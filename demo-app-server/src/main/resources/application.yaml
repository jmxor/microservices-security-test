server:
  port: 8444
  ssl:
    enabled: true
    certificate: /certs/app.local.test.pem
    certificate-private-key: /certs/app.local.test-key.pem

spring:
  application:
    name: app-server
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: app-client
            client-secret: your-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "https://app.local.test/login/oauth2/code/keycloak"

        provider:
          keycloak:
            issuer-uri: https://keycloak.local.test/realms/myrealm
